{
  "Dhcp4": {
    "valid-lifetime": 4000,
    "renew-timer": 1000,
    "rebind-timer": 2000,
    "interfaces-config": {
      "interfaces": ["enp3s0"]
    },
    "control-socket": {
          "socket-type": "unix",
          "socket-name": "/run/kea/kea4-ctrl-socket"
      },
    "lease-database": {
      "type": "memfile",
      "persist": true,
      "name": "/var/lib/kea/kea-leases4.csv"
    },
    "subnet4": [
      {
        "id": 1,
        "subnet": "192.168.10.0/24",
        "pools": [
          {
            "pool": "192.168.10.100 - 192.168.10.200"
          },
        ],
         "option-data": [{
            "name": "routers",
            "data": "192.168.10.1"
        },
        {
            "name": "domain-name-servers",
            "data": "1.1.1.1, 8.8.8.8"
        }]
      }
    ]
  }
}


